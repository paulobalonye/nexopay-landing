<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexoPay — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #060608; --panel: #111118; --border: rgba(255,255,255,0.08);
  --white: #f5f4f0; --muted: #9b9baa; --accent: #00e5a0; --red: #ff4757;
  --yellow: #ffd32a;
}
body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card {
  background: var(--panel); border: 1px solid var(--border);
  padding: 48px; width: 380px; position: relative;
}
.login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #0af); }
.login-logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.login-logo span { color: var(--accent); }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
.field-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
.field-input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--white); padding: 14px 16px; font-family: 'Inter', sans-serif;
  font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 20px;
}
.field-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; background: var(--accent); color: var(--black); padding: 15px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  letter-spacing: 0.06em; border: none; cursor: pointer; transition: all 0.2s;
}
.login-btn:hover { background: white; }
.login-err { font-size: 13px; color: var(--red); margin-top: 12px; text-align: center; }

/* DASHBOARD */
.dashboard { display: none; }
.topbar {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 18px 40px; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
.topbar-logo span { color: var(--accent); }
.topbar-right { display: flex; gap: 12px; align-items: center; }
.badge { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); color: var(--accent); padding: 5px 14px; font-size: 12px; font-weight: 600; }
.btn-sm {
  padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--muted); transition: all 0.2s; letter-spacing: 0.04em;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
.btn-export {
  padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; background: var(--accent); color: var(--black);
  border: none; transition: all 0.2s;
}
.btn-export:hover { background: white; }

.main { padding: 40px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
.stat-card {
  background: var(--panel); border: 1px solid var(--border);
  padding: 28px 24px; position: relative; overflow: hidden;
}
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
.stat-num { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -0.03em; color: var(--white); line-height: 1; margin-bottom: 6px; }
.stat-num .accent { color: var(--accent); }
.stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* TABLE */
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.table-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
.search-input {
  background: var(--panel); border: 1px solid var(--border); color: var(--white);
  padding: 10px 16px; font-family: 'Inter', sans-serif; font-size: 13px;
  outline: none; width: 260px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.table-wrap { background: var(--panel); border: 1px solid var(--border); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
th { padding: 14px 20px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: left; font-weight: 500; }
td { padding: 16px 20px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.td-name { font-weight: 600; color: var(--white); }
.td-email { color: var(--accent); }
.td-badge {
  font-size: 10px; letter-spacing: 0.08em; padding: 3px 10px;
  border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
}
.td-date { color: var(--muted); font-size: 12px; }
.del-btn {
  background: none; border: 1px solid rgba(255,71,87,0.2); color: rgba(255,71,87,0.5);
  padding: 5px 12px; font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.del-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255,71,87,0.05); }

.empty-state { text-align: center; padding: 80px 40px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }
.dot-pulse::after { content: '...'; animation: dots 1.5s infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%,60%{content:'..'} 80%,100%{content:'...'} }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">Nexo<span>Pay</span></div>
    <p class="login-sub">Admin Dashboard — Enter your password to continue</p>
    <label class="field-label">Password</label>
    <input type="password" class="field-input" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ENTER DASHBOARD →</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">Nexo<span>Pay</span> <span style="font-size:13px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:400;">/ Admin</span></div>
    <div class="topbar-right">
      <span class="badge" id="totalBadge">0 leads</span>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Signups</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">Joined Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statWeek">0</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-num"><span id="statTop" style="font-size:20px;">—</span></div>
        <div class="stat-label">Top Use Case</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-header">
      <div class="table-title">Waitlist Leads</div>
      <input type="text" class="search-input" placeholder="Search name, email, company..." oninput="filterLeads(this.value)">
    </div>

    <div class="table-wrap">
      <div class="loading dot-pulse" id="loadingState">Loading leads</div>
      <table id="leadsTable" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Use Case</th>
            <th>Volume</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leadsBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">📭</div>
        <p>No leads yet — share the landing page to start collecting signups.</p>
      </div>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('np_admin_token');
let allLeads = [];

// Auto-login if token stored
if (token) showDashboard();

async function login() {
  const pw = document.getElementById('passwordInput').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';

  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  const data = await res.json();

  if (data.success) {
    token = data.token;
    localStorage.setItem('np_admin_token', token);
    showDashboard();
  } else {
    err.textContent = 'Incorrect password. Try again.';
    document.getElementById('passwordInput').style.borderColor = '#ff4757';
    setTimeout(() => document.getElementById('passwordInput').style.borderColor = '', 2000);
  }
}

function logout() {
  localStorage.removeItem('np_admin_token');
  token = null;
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadLeads();
}

async function loadLeads() {
  try {
    const res = await fetch('/api/admin/leads', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    allLeads = data.leads || [];
    renderLeads(allLeads);
    updateStats(allLeads);
  } catch (e) {
    document.getElementById('loadingState').textContent = 'Failed to load — check connection.';
  }
}

function updateStats(leads) {
  document.getElementById('statTotal').textContent = leads.length;
  document.getElementById('totalBadge').textContent = leads.length + ' leads';

  const today = new Date(); today.setHours(0,0,0,0);
  const week = new Date(); week.setDate(week.getDate() - 7);

  const todayCount = leads.filter(l => new Date(l.created_at) >= today).length;
  const weekCount = leads.filter(l => new Date(l.created_at) >= week).length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statWeek').textContent = weekCount;

  // Top use case
  const useCases = leads.map(l => l.use_case).filter(Boolean);
  if (useCases.length) {
    const freq = useCases.reduce((a, v) => { a[v] = (a[v]||0)+1; return a; }, {});
    const top = Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
    document.getElementById('statTop').textContent = top.split('/')[0].trim();
  }
}

function renderLeads(leads) {
  document.getElementById('loadingState').style.display = 'none';

  if (leads.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('leadsTable').style.display = 'none';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('leadsTable').style.display = 'table';

  const tbody = document.getElementById('leadsBody');
  tbody.innerHTML = leads.map(l => `
    <tr id="row-${l.id}">
      <td class="td-date">${l.id}</td>
      <td class="td-name">${esc(l.name)}</td>
      <td class="td-email">${esc(l.email)}</td>
      <td>${esc(l.company || '—')}</td>
      <td><span class="td-badge">${esc(l.use_case || '—')}</span></td>
      <td><span class="td-badge">${esc(l.monthly_volume || '—')}</span></td>
      <td class="td-date">${formatDate(l.created_at)}</td>
      <td><button class="del-btn" onclick="deleteLead(${l.id})">Delete</button></td>
    </tr>
  `).join('');
}

function filterLeads(query) {
  const q = query.toLowerCase();
  const filtered = allLeads.filter(l =>
    (l.name||'').toLowerCase().includes(q) ||
    (l.email||'').toLowerCase().includes(q) ||
    (l.company||'').toLowerCase().includes(q)
  );
  renderLeads(filtered);
}

async function deleteLead(id) {
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  await fetch(`/api/admin/leads/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  allLeads = allLeads.filter(l => l.id !== id);
  renderLeads(allLeads);
  updateStats(allLeads);
}

function exportCSV() {
  window.location.href = '/api/admin/export?token=' + token;
  // Use auth header via a temp fetch + blob download
  fetch('/api/admin/export', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'nexopay-waitlist.csv'; a.click();
    });
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
